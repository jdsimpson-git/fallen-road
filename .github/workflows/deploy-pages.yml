name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_ASSET_VERSION: ${{ github.sha }}
      # The bare Pages URL should open the game directly.
      - run: cp dist/client/game.html dist/client/index.html
      - name: Stamp Pages entrypoint assets with commit SHA
        run: |
          cp dist/client/game.js "dist/client/game-${GITHUB_SHA}.js"
          cp dist/client/game.css "dist/client/game-${GITHUB_SHA}.css"
          cp dist/client/modulepreload-polyfill.js "dist/client/modulepreload-polyfill-${GITHUB_SHA}.js"
          for file in dist/client/game.html dist/client/index.html; do
            perl -0pi -e 's|\./game\.js|./game-$ENV{GITHUB_SHA}.js|g; s|\./game\.css|./game-$ENV{GITHUB_SHA}.css|g; s|\./modulepreload-polyfill\.js|./modulepreload-polyfill-$ENV{GITHUB_SHA}.js|g' "$file"
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client
      - id: deployment
        uses: actions/deploy-pages@v4
